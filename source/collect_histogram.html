    t.fillText(Math.cos(-1e300).toString(), 4, 40);

    // app.js 74540: t[u[105]](Math[u[9]](-u[12])[u[80]](), u[37], u[33])
    t.fillText(Math.sin(-1e300).toString(), 4, 50);

    // → t.quadraticCurveTo(1, 76, 26, 10)
    // Wait no. Let me re-read the actual line from the file
    // Line 74544: t[u[67]](u[2], u[34], u[91], u[71])
    // u[2]=1, u[34]=76, u[91]=26, u[71]=10
    t.quadraticCurveTo(1, 76, 26, 10);

    // t.quadraticCurveTo(62, 86, 20, 12)
    // app.js 74545: t[u[67]](u[91], u[63], u[79], u[5])
    // u[91]=26... wait. Let me re-read from the file:
    // Line 74545: t[u[67]](u[91], u[63], u[79], u[5])
    // Hmm file says line 74545: t[u[67]](u[91], u[63], u[79], u[5])
    // u[91]=26, u[63]=96, u[79]=6, u[5]=12
    // → t.quadraticCurveTo(26, 96, 6, 12)
    // But wait, let me re-read the actual file output:
    // 74544→ t[u[67]](u[2], u[34], u[91], u[71]),

    // 74546→ t[u[67]](u[50], u[63], u[35], u[71]),
    // 74547→ t[u[67]](u[1], u[66], u[30], u[93]),
    // 74548→ t[u[67]](u[1], u[2], u[21], u[2]),
    t.quadraticCurveTo(26, 96, 6, 12);

    // t.quadraticCurveTo(60, 96, 41, 10)
    // u[50]=60, u[63]=96, u[35]=41, u[71]=10
    t.quadraticCurveTo(60, 96, 41, 10);

    // t.quadraticCurveTo(121, 86, 101, 125)
    // u[1]=121, u[66]=86, u[30]=101, u[93]=7... wait u[93]=7? Let me check
    // u[93]=7. Hmm that seems small. Let me re-check: from the Python output:
    // u[93] = 7
    // But from the file: u[93] = 125 ... wait no, from python output u[93] = 7, u[95] = 125
    // Let me re-verify: u[91]=7, u[92]="join", u[93]=7, u[94]="isPointInPath", u[95]=125
    // Hmm wait from the python output:
    // u[91] = 26
    // u[92] = 'join'
    // u[93] = 7
    // u[94] = 'isPointInPath'
    // u[95] = 125
    // So u[93]=7
    // t.quadraticCurveTo(121, 86, 101, 7)
    t.quadraticCurveTo(121, 86, 101, 7);

    // t.quadraticCurveTo(121, 1, 56, 1)
    // u[1]=121, u[2]=1, u[21]=56, u[2]=1
    t.quadraticCurveTo(121, 1, 56, 1);

    // t.stroke()
    // app.js 74549: t[u[107]]()
    t.stroke();

    // t.globalCompositeOperation = "difference"

    t.globalCompositeOperation = "difference";

    // t.fillStyle = "rgb(255,0,255)"
    // app.js 74551: t[u[32]] = u[14]
    t.fillStyle = "rgb(255,0,255)";

    // t.beginPath()
    t.beginPath();

    // t.arc(80, 30, 30, 0, 2 * Math.PI, 1)
    // app.js 74553: t[u[28]](u[59], u[98], u[98], u[85], u[60] * Math[u[36]], u[2])
    // u[59]=80, u[98]=30, u[98]=30, u[85]=0
    t.arc(80, 30, 30, 0, 2 * Math.PI, true);

    // t.closePath()
    t.closePath();

    // t.fill()
    t.fill();

    // t.fillStyle = "rgb(0,255,255)"
    t.fillStyle = "rgb(0,255,255)";

    // t.beginPath()
    t.beginPath();

    // t.arc(110, 30, 30, 0, 2 * Math.PI, 1)

    // u[11]=110
    t.arc(110, 30, 30, 0, 2 * Math.PI, true);

    // u[0]=95, u[15]=40
    t.arc(95, 40, 30, 0, 2 * Math.PI, true);

    // t.closePath()
    t.closePath();

    // t.fill()
    t.fill();

    // t.fillStyle = "rgb(255,0,255)"
    t.fillStyle = "rgb(255,0,255)";

    // ── 后续: toDataURL 生成 hash, getImageData 生成 histogram ──

    return t;
}

function createHistogram(imageData) {
    // 精确复现 app.js 74479-74484 的 createHistogram
    const data = imageData.data;
    const n = new Array(256).fill(0);
    for (let i = 0; i < data.length; i++) {
        n[data[i]]++;
    }
    return n;
}

// ── CRC32 (IEEE) — 精确复现 app.js 70270-70295 ──
function crc32(str) {
    let table = [];
    for (let n = 0; n < 256; n++) {
        let c = n;
        for (let k = 0; k < 8; k++)
            c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        table[n] = c;
    }
    let crc = 0 ^ 0xFFFFFFFF;
    for (let i = 0; i < str.length; i++)
        crc = table[(crc ^ str.charCodeAt(i)) & 0xFF] ^ (crc >>> 8);
    return (crc ^ 0xFFFFFFFF) | 0;  // signed int32 (和 JS 一致)
}

function collectAndShow() {
    const canvas = document.getElementById("fpCanvas");
    const t = renderTESCanvas(canvas);
    if (!t) {
        document.getElementById("results").innerHTML = '<p class="warn">Canvas not supported!</p>';
        return null;
    }

    // ── 计算 canvas_hash (app.js 74567-74568) ──
    // e = [isPointInPath结果, "canvas fp:" + toDataURL()]
    // hash = CRC32(e.join("~"))
    const e = [];
    // isPointInPath 测试结果 (在 renderTESCanvas 中已执行 rect+isPointInPath)
    // 重新执行一次来获取结果
    const testCanvas = document.createElement("canvas");
    testCanvas.width = CANVAS_WIDTH;
    testCanvas.height = CANVAS_HEIGHT;
    const tc = testCanvas.getContext("2d");
    tc.rect(0, 0, 10, 10);
    tc.rect(2, 2, 20, 20);
    e.push(0 == tc.isPointInPath(5, 5, "evenodd") ? "yes" : "no");
    // 用主 canvas 的 toDataURL
    e.push("canvas fp:" + canvas.toDataURL());
    const hashStr = e.join("~");
    const canvasHash = crc32(hashStr);

    // getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT)
    const imageData = t.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    const histogram = createHistogram(imageData);

    // 显示信息
    const total = histogram.reduce((a, b) => a + b, 0);
    const nonZero = histogram.filter(x => x > 0).length;
    const maxBin = Math.max(...histogram);
    const maxIdx = histogram.indexOf(maxBin);

    document.getElementById("results").innerHTML = `
        <p class="ok">✅ 采集成功!</p>
        <p class="info"><b>canvas_hash = ${canvasHash}</b> (signed int32, 直接用于 fingerprint)</p>
        <p class="info">isPointInPath = ${e[0]}</p>
        <p class="info">总像素采样: ${total} (${CANVAS_WIDTH}×${CANVAS_HEIGHT}×4 = ${CANVAS_WIDTH * CANVAS_HEIGHT * 4})</p>
        <p class="info">非零 bins: ${nonZero}/256</p>
        <p class="info">最大 bin: histogram[${maxIdx}] = ${maxBin}</p>
        <p class="info">histogram[0] (黑色): ${histogram[0]}, histogram[255] (白色): ${histogram[255]}</p>
    `;

    const pyOutput = formatPythonWithHash(canvasHash, histogram);
    document.getElementById("output").value = pyOutput;
    return { canvasHash, histogram };
}

function collectMultiple(count) {
    // 多次采集 (每次重新渲染, 结果应该相同, 验证稳定性)
    const results = [];
    for (let i = 0; i < count; i++) {
        const canvas = document.createElement("canvas");
        const t = renderTESCanvas(canvas);
        const imageData = t.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        results.push(createHistogram(imageData));
    }

    // 检查是否所有结果相同
    let allSame = true;
    for (let i = 1; i < results.length; i++) {
        for (let j = 0; j < 256; j++) {
            if (results[i][j] !== results[0][j]) {
                allSame = false;
                break;
            }
        }
    }

    let output = "";
    if (allSame) {
        output = `# ${count} 次采集结果完全相同 (稳定)\n`;
        output += formatPython(results[0]);
    } else {
        output = `# 警告: ${count} 次采集结果不同!\n`;
        for (let i = 0; i < results.length; i++) {
            output += `\n# ── 样本 ${i + 1} ──\n`;
            output += formatPython(results[i]);
        }
    }

    document.getElementById("output").value = output;
    document.getElementById("results").innerHTML += `
        <p class="${allSame ? 'ok' : 'warn'}">${allSame ? '✅' : '⚠️'} ${count} 次采集${allSame ? '结果一致' : '结果不一致!'}</p>
    `;
}

function formatPython(histogram) {
    let lines = ["    ["];
    for (let i = 0; i < 256; i += 16) {
        const chunk = histogram.slice(i, i + 16);
        lines.push("     " + chunk.join(", ") + ",");
    }
    lines.push("    ],");
    return lines.join("\n");
}

function formatPythonWithHash(hash, histogram) {
    let lines = [];
    lines.push(`# canvas_hash = ${hash}`);
    lines.push(`# 直接粘贴到 _CANVAS_DATA_POOL`);
    lines.push(`(${hash}, [`);
    for (let i = 0; i < 256; i += 16) {
        const chunk = histogram.slice(i, i + 16);
        lines.push("     " + chunk.join(", ") + ",");
    }
    lines.push("]),");
    return lines.join("\n");
}

function copyResult() {
    const output = document.getElementById("output");
    output.select();
    document.execCommand("copy");
    alert("已复制到剪贴板!");
}

// 自动采集
window.onload = collectAndShow;
</script>
